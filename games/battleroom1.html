<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game</title>
</head>

<body>

<h1>배틀룸 1 테스트</h1>

<div id="gameArea">
<div id="battle-ui">
    <div class="opponent-side">
        <h2 id="p2-name">Player 2</h2>
        <div class="active-pokemon">
            <span id="p2-active-name">---</span>
            <span id="p2-active-hp">0/0</span>
        </div>
    </div>

    <hr>

    <div class="player-side">
        <h2 id="p1-name">Player 1</h2>
        <div class="active-pokemon">
            <strong id="p1-active-name">---</strong>
            <span id="p1-active-hp">0/0</span>
        </div>

        <div id="bench-ui">
            <p>교체하기:</p>
            <button id="bench-btn-0" style="display:none;"></button>
            <button id="bench-btn-1" style="display:none;"></button>
            <button id="bench-btn-2" style="display:none;"></button>
        </div>

        <button id="attackBtn">공격하기</button>
    </div>
</div>


<script type="module">
    import { loadBattle } from "../js/battle.js";
    loadBattle("battleroom1");
</script>


</body>
</html>
