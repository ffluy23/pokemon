<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>배틀룸1</title>
  <link rel="stylesheet" href="css/style2.css">
  <style>
    /* ══ 인트로 오버레이 ══ */
    #intro-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: #000; overflow: hidden;
      transition: opacity 0.8s ease;
    }
    #intro-overlay.fade-out { opacity: 0; pointer-events: none; }
    #intro-overlay.hidden   { display: none; }

    #touch-screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    #touch-prompt {
      color: #fff; font-size: clamp(1rem,4vw,1.6rem);
      letter-spacing: 0.2em;
      animation: blink 1.4s ease-in-out infinite;
    }
    #touch-ready-status {
      margin-top: 2vh; color: rgba(255,255,255,0.45);
      font-size: clamp(0.7rem,2.5vw,1rem); letter-spacing: 0.1em;
    }
    @keyframes blink { 0%,100%{opacity:.2} 50%{opacity:1} }

    #vs-screen { position: absolute; inset: 0; display: none; }
    #vs-screen.show { display: block; }
    .vs-bg-line {
      position: absolute; width: 300%; height: 300%;
      background: repeating-linear-gradient(45deg,rgba(255,255,255,.08) 0px,rgba(255,255,255,.08) 2px,transparent 2px,transparent 25px);
      animation: moveBg .8s linear infinite;
    }
    @keyframes moveBg { from{transform:translate(0,0)} to{transform:translate(-300px,-300px)} }
    .vs-flash { position:absolute;width:100%;height:100%;background:white;opacity:0;z-index:5;pointer-events:none; }
    .vs-flash.show { animation: flashBoom .25s ease-out; }
    @keyframes flashBoom { 0%{opacity:1} 100%{opacity:0} }
    .vs-burst {
      position:absolute;top:50%;left:50%;
      width:clamp(20px,5vw,60px);height:clamp(20px,5vw,60px);
      border-radius:50%;border:4px solid rgba(255,255,255,.7);
      transform:translate(-50%,-50%) scale(0);z-index:9;pointer-events:none;
    }
    .vs-burst.show { animation: burst .5s ease-out forwards; }
    @keyframes burst { 0%{transform:translate(-50%,-50%) scale(0);opacity:1} 100%{transform:translate(-50%,-50%) scale(8);opacity:0} }
    .vs-slide {
      position:absolute;width:100%;height:100%;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 clamp(10px,5vw,80px);
    }
    .vs-left,.vs-right { width:45%;color:white;opacity:0; }
    .vs-left  { transform:translateX(-150%) scale(1.2);text-align:left; }
    .vs-right { transform:translateX(150%) scale(1.2);text-align:right; }
    .vs-left.show  { animation:slideLeft  .4s cubic-bezier(.2,1.2,.3,1) forwards; }
    .vs-right.show { animation:slideRight .4s cubic-bezier(.2,1.2,.3,1) forwards; }
    @keyframes slideLeft  { 80%{transform:translateX(10%) scale(1.05);opacity:1} 100%{transform:translateX(0) scale(1);opacity:1} }
    @keyframes slideRight { 80%{transform:translateX(-10%) scale(1.05);opacity:1} 100%{transform:translateX(0) scale(1);opacity:1} }
    .vs-label {
      position:absolute;top:50%;left:50%;
      transform:translate(-50%,-50%) scale(0);
      font-size:clamp(3rem,10vw,7rem);font-weight:bold;
      color:#ffcc00;text-shadow:0 0 20px red,0 0 60px orange;
      z-index:10;pointer-events:none;
    }
    .vs-label.show { animation:vsImpact .4s cubic-bezier(.2,1.5,.3,1) forwards; }
    @keyframes vsImpact { 0%{transform:translate(-50%,-50%) scale(0)} 60%{transform:translate(-50%,-50%) scale(1.6)} 80%{transform:translate(-50%,-50%) scale(.9)} 100%{transform:translate(-50%,-50%) scale(1)} }
    .vs-name { font-size:clamp(1.2rem,4vw,2.8rem);font-weight:bold;letter-spacing:.15em; }
    .vs-inner { display:inline-block; }
    .vs-shake { animation:vsShake .25s; }
    @keyframes vsShake { 0%{transform:translate(0,0)} 25%{transform:translate(-1vw,.5vh)} 50%{transform:translate(1vw,-.5vh)} 75%{transform:translate(-.6vw,.3vh)} 100%{transform:translate(0,0)} }
    .drift-left  { animation:driftLeft  20s linear infinite alternate; }
    .drift-right { animation:driftRight 20s linear infinite alternate; }
    @keyframes driftLeft  { from{transform:translateY(0)} to{transform:translateY(40px)} }
    @keyframes driftRight { from{transform:translateY(0)} to{transform:translateY(-40px)} }
    @media (max-width:430px) {
      .vs-slide { flex-direction:column;justify-content:center;gap:8vh; }
      .vs-left,.vs-right { width:100%;text-align:center; }
      .vs-left  { transform:translateY(-150%) scale(1.2); }
      .vs-right { transform:translateY(150%) scale(1.2); }
      @keyframes slideLeft  { 80%{transform:translateY(10%) scale(1.05);opacity:1} 100%{transform:translateY(0) scale(1);opacity:1} }
      @keyframes slideRight { 80%{transform:translateY(-10%) scale(1.05);opacity:1} 100%{transform:translateY(0) scale(1);opacity:1} }
      @keyframes driftLeft  { from{transform:translateX(0)} to{transform:translateX(-40px)} }
      @keyframes driftRight { from{transform:translateX(0)} to{transform:translateX(40px)} }
    }

    /* ══ 배틀 화면 — PC 기존 그대로 ══ */
    #battle-screen { opacity: 0; transition: opacity 0.8s ease; }
    #battle-screen.visible { opacity: 1; }

    #dice-wrap { display:none; justify-content:center; align-items:center; gap:40px; margin:20px 0; }
    .dice-box { text-align:center; }
    .dice-box span { display:block; font-size:12px; color:gray; margin-bottom:4px; }
    .dice-num { font-size:64px; font-weight:bold; color:#e63946; min-width:80px; text-align:center; }
    #turn-display { font-size:20px; font-weight:bold; margin:8px 0; }
    #turn-count   { font-size:14px; color:gray; }

    #move-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      max-width: 320px;
      margin: 12px 0;
    }
    #move-buttons button {
      width: 300px; height: 100px;
      padding: 0;
      background-image: url('https://past-amethyst-ehkdgz3cu8.edgeone.app/제목%20없음-3.png');
      background-size: 100% 100%;
      background-color: transparent;
      background-repeat: no-repeat;
      border: none;
      font-size: 12px; font-weight: bold; color: white;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
      white-space: pre-line; text-align: center; line-height: 1.4;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #move-buttons button:disabled { opacity: 0.4; cursor: not-allowed; }
    #move-buttons button:not(:disabled):hover  { filter: brightness(1.15); }
    #move-buttons button:not(:disabled):active { filter: brightness(0.9); transform: scale(0.97); }

    #battle-log { width:100%; max-height:150px; overflow-y:auto; border:1px solid #ccc; padding:8px; background:#f9f9f9; font-size:14px; box-sizing:border-box; }
    #battle-log p { margin:2px 0; }
    button:disabled { opacity:0.4; cursor:not-allowed; }
    #leaveBtn { display:none; }
    .hp-bar-wrap { width:100%; max-width:240px; background:#333; border-radius:4px; height:10px; margin:4px 0 6px; overflow:hidden; }
    .hp-bar { height:100%; width:100%; background:#4caf50; border-radius:4px; transition:width 0.5s ease,background-color 0.4s ease; }
    .portrait-img { width:120px; height:120px; object-fit:contain; display:none; opacity:0; transition:opacity 0.35s ease; }
    .portrait-img.visible { display:block; opacity:1; }

    .attacker-flash { animation: attackerPulse 0.25s ease-out; }
    @keyframes attackerPulse { 0%{filter:brightness(1)} 40%{filter:brightness(2.8) saturate(1.6)} 100%{filter:brightness(1)} }
    .defender-hit { animation: defenderHit 0.35s ease; }
    @keyframes defenderHit { 0%{transform:translateX(0)} 20%{transform:translateX(-14px)} 45%{transform:translateX(11px)} 65%{transform:translateX(-8px)} 85%{transform:translateX(5px)} 100%{transform:translateX(0)} }
    .blink-damage { animation: blinkDamage 0.18s steps(1) 3; }
    @keyframes blinkDamage { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes slideInLeft  { from{opacity:0;transform:translateX(-40px)} to{opacity:1;transform:translateX(0)} }
    @keyframes slideInRight { from{opacity:0;transform:translateX(40px)}  to{opacity:1;transform:translateX(0)} }
    .slide-in-my    { animation: slideInLeft  0.4s ease forwards; }
    .slide-in-enemy { animation: slideInRight 0.4s ease forwards; }

    /* PC에서 래퍼 2개는 그냥 투명하게 흘려보냄 */
    #battle-middle,
    #battle-bottom { display: contents; }

    /* ══════════════════════════════════════
       모바일 전용 ≤ 480px
       PC 스타일 건드리지 않음
    ══════════════════════════════════════ */
    @media (max-width: 480px) {
      :root {
        --bg:       #0d0d14;
        --surface:  #161622;
        --surface2: #1e1e2e;
        --border:   rgba(255,255,255,0.08);
        --text:     #e8e8f0;
        --dim:      rgba(255,255,255,0.45);
        --accent:   #ffcc00;
        --red:      #e63946;
        --btn-h:    clamp(72px,13vw,100px);
        --safe-b:   env(safe-area-inset-bottom, 0px);
      }

      html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); }

      /* 배틀 화면 전체 flex 컬럼 */
      #battle-screen {
        display: flex;
        flex-direction: column;
        height: 100dvh;
        overflow: hidden;
        background: var(--bg);
      }

      /* 주사위는 flex:0 0 auto 로 헤더 바로 아래 */
      #dice-wrap {
        flex: 0 0 auto;
        margin: 0;
        padding: 12px 0;
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
        gap: 32px;
      }
      .dice-num { font-size: 48px; color: var(--red); }
      .dice-box span { color: var(--dim); }

      /* PC 전용 텍스트 요소 재스타일 */
      #turn-display {
        font-size: 15px; font-weight: 700;
        color: var(--accent); margin: 0;
        padding: 10px 14px 8px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex: 0 0 auto;
      }
      #turn-count {
        display: none; /* 헤더에 공간 없으니 생략 — turn-display 옆에 붙이려면 아래 방식 */
      }
      #spectator-list {
        font-size: 11px; color: var(--dim);
        padding: 0 14px 6px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex: 0 0 auto;
      }

      /* "Player1 vs Player2" 줄 + hr 숨기기 */
      #battle-screen > div:not([id]),
      #battle-screen > hr { display: none; }

      /* ── 중간 스크롤 영역 ── */
      #battle-middle {
        display: flex;
        flex-direction: column;
        flex: 1 1 auto;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }

      /* 상대 포켓몬 */
      #enemy-pokemon-area {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        padding: 12px 16px 14px;
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
      }
      #enemy-pokemon-area h3 {
        font-size: 10px; letter-spacing: .15em; text-transform: uppercase;
        color: var(--dim); margin-bottom: 6px; width: 100%; text-align: right;
      }
      /* 포트레이트 + 정보 가로 배치 */
      #enemy-pokemon-area .pkmn-row {
        width: 100%; display: flex; align-items: center;
        gap: 12px; flex-direction: row-reverse;
      }
      #enemy-pokemon-area .pkmn-info { flex: 1; min-width: 0; text-align: right; }

      /* 내 포켓몬 */
      #my-pokemon-area {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        padding: 12px 16px 14px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
      }
      #my-pokemon-area h3 {
        font-size: 10px; letter-spacing: .15em; text-transform: uppercase;
        color: var(--dim); margin-bottom: 6px; width: 100%;
      }
      #my-pokemon-area .pkmn-row {
        width: 100%; display: flex; align-items: center; gap: 12px;
      }
      #my-pokemon-area .pkmn-info { flex: 1; min-width: 0; }

      /* 공통 포켓몬 카드 스타일 */
      .portrait-img {
        width: clamp(64px,18vw,90px);
        height: clamp(64px,18vw,90px);
        flex-shrink: 0;
      }
      #enemy-active-name, #my-active-name {
        font-size: clamp(14px,3.5vw,18px); font-weight: 700;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;
      }
      .hp-bar-wrap {
        width: 100%; max-width: 100%;
        background: rgba(255,255,255,0.1);
        height: 8px; margin: 6px 0 4px;
      }
      #enemy-active-hp, #my-active-hp { font-size: 12px; color: var(--dim); display: block; }

      /* 교체 버튼 */
      #bench-container {
        display: flex; flex-wrap: wrap; gap: 6px;
        padding: 10px 14px;
        background: var(--surface2);
        border-bottom: 1px solid var(--border);
      }
      #bench-container button {
        flex: 1 1 auto; min-width: 120px;
        padding: 8px 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text); font-size: 12px; cursor: pointer;
      }
      #bench-container button:not(:disabled):hover  { background: #2a2a3e; }
      #bench-container button:not(:disabled):active { transform: scale(0.97); }
      #bench-container button:disabled { opacity: .35; cursor: not-allowed; }

      /* ── 하단 고정 ── */
      #battle-bottom {
        display: flex;
        flex-direction: column;
        flex: 0 0 auto;
        background: var(--surface);
        border-top: 1px solid var(--border);
        padding-bottom: var(--safe-b);
      }

      /* 기술 버튼 2×2 꽉 채우기 */
      #move-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        max-width: 100%;
        margin: 0;
        padding: 10px 12px 6px;
      }
      #move-buttons button {
        width: 100%;
        height: var(--btn-h);
        font-size: clamp(10px,2.5vw,13px);
        border-radius: 4px;
      }

      /* 방 나가기 */
      #leaveBtn {
        margin: 6px 12px;
        padding: 10px;
        background: rgba(230,57,70,0.15);
        border: 1px solid rgba(230,57,70,0.4) !important;
        border-radius: 8px;
        color: var(--red);
        font-size: 13px; font-weight: 600;
        cursor: pointer; text-align: center;
        opacity: 1 !important;
      }

      /* 배틀 로그 */
      #battle-log {
        max-height: clamp(80px,18vh,130px);
        border: none;
        border-top: 1px solid var(--border);
        background: transparent;
        padding: 6px 12px 8px;
        font-size: 13px; color: var(--text);
        scroll-behavior: smooth;
      }
      #battle-log p { margin: 3px 0; line-height: 1.5; color: var(--dim); }
      #battle-log p:last-child { color: #fff; }
    }
  </style>
</head>
<body>

  <!-- ══ 인트로 오버레이 ══ -->
  <div id="intro-overlay">
    <div id="touch-screen">
      <div id="touch-prompt">아무데나 터치하여 시작!</div>
      <div id="touch-ready-status"></div>
    </div>
    <div id="vs-screen">
      <div class="vs-bg-line"></div>
      <div class="vs-flash"  id="vs-flash"></div>
      <div class="vs-burst"  id="vs-burst"></div>
      <div class="vs-slide">
        <div class="vs-left"  id="vs-left"><div class="vs-inner" id="vs-inner-left"><div class="vs-name" id="vs-name-left">PLAYER1</div></div></div>
        <div class="vs-right" id="vs-right"><div class="vs-inner" id="vs-inner-right"><div class="vs-name" id="vs-name-right">PLAYER2</div></div></div>
      </div>
      <div class="vs-label" id="vs-label">VS</div>
    </div>
  </div>

  <!-- ══ 배틀 화면 ══ -->
  <div id="battle-screen">

    <div id="dice-wrap">
      <div class="dice-box" id="dice-box-p1">
        <span id="p1-name-dice">Player1</span>
        <div class="dice-num" id="dice-p1">?</div>
      </div>
      <div class="dice-box" id="dice-box-p2">
        <span id="p2-name-dice">Player2</span>
        <div class="dice-num" id="dice-p2">?</div>
      </div>
      <div class="dice-box" id="dice-box-hit" style="display:none;">
        <span>명중 판정</span>
        <div class="dice-num" id="dice-hit">?</div>
      </div>
    </div>

    <div id="turn-display">대기 중...</div>
    <div id="turn-count"></div>
    <div id="spectator-list"></div>
    <div><span id="p1-name">Player1</span> vs <span id="p2-name">Player2</span></div>
    <hr>

    <!-- ▼ 래퍼 1: 스크롤되는 포켓몬 + 교체 영역 -->
    <div id="battle-middle">

      <div id="enemy-pokemon-area">
        <h3>상대 포켓몬</h3>
        <div class="pkmn-row">
          <img id="enemy-portrait" class="portrait-img" alt="" />
          <div class="pkmn-info">
            <p id="enemy-active-name">-</p>
            <div class="hp-bar-wrap"><div class="hp-bar" id="enemy-hp-bar"></div></div>
            <p id="enemy-active-hp"></p>
          </div>
        </div>
      </div>
      <hr>
      <div id="my-pokemon-area">
        <h3>내 포켓몬</h3>
        <div class="pkmn-row">
          <img id="my-portrait" class="portrait-img" alt="" />
          <div class="pkmn-info">
            <p id="my-active-name">-</p>
            <div class="hp-bar-wrap"><div class="hp-bar" id="my-hp-bar"></div></div>
            <p id="my-active-hp">HP: - / -</p>
          </div>
        </div>
      </div>

      <div>
        <h4>교체할 포켓몬</h4>
        <div id="bench-container"></div>
      </div>

    </div>
    <!-- ▲ 래퍼 1 끝 -->

    <!-- ▼ 래퍼 2: 하단 고정 (기술버튼 + 방나가기 + 로그) -->
    <div id="battle-bottom">

      <div id="move-buttons">
        <button id="move-btn-0" disabled>-</button>
        <button id="move-btn-1" disabled>-</button>
        <button id="move-btn-2" disabled>-</button>
        <button id="move-btn-3" disabled>-</button>
      </div>

      <button id="leaveBtn">방 나가기</button>

      <div>
        <h4>배틀 로그</h4>
        <div id="battle-log"></div>
      </div>

    </div>
    <!-- ▲ 래퍼 2 끝 -->

  </div>

  <script>const ROOM_ID = "battleroom1"</script>
  <script type="module" src="../js/intro.js"></script>
  <script type="module" src="../js/battle.js"></script>
</body>
</html>
