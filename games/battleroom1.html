<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game</title>
</head>

<body>

        <p>현재 포켓몬: <strong id="player2_active_name">-</strong></p>

    <hr>

    <div id="p1-area">

        <p>HP: <span id="player1_hp">0</span> / <span id="p1-max-hp">0</span></p>
        
        <div id="p1-controls">
            <div id="p1-bench-btns"></div> <button id="attackBtn">공격!</button>
        </div>
    </div>
</div>

</div>


<script type="module">
    import { loadBattle } from "../js/battle.js";
    loadBattle("battleroom1");
</script>
