<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game</title>
</head>

<body>

<h1>배틀룸 1 테스트</h1>

<div id="gameArea">
    <div id="battle-screen">
  <div id="opponent-area">
    <h2 id="p2-name">Player 2</h2>
    <div id="p2-active-pokemon">
      <span id="p2-active-name">---</span>
      <progress id="p2-active-hp-bar" value="100" max="100"></progress>
      <span id="p2-active-hp-text">0/0</span>
    </div>
  </div>

  <hr>

  <div id="player-area">
    <h2 id="p1-name">Player 1</h2>
    <div id="p1-active-pokemon">
      <strong id="p1-active-name">---</strong>
      <progress id="p1-active-hp-bar" value="100" max="100"></progress>
      <span id="p1-active-hp-text">0/0</span>
    </div>

    <div id="p1-bench">
      <button id="bench-1" onclick="switchPokemon(1)">대기1</button>
      <button id="bench-2" onclick="switchPokemon(2)">대기2</button>
    </div>
  </div>

  <div id="battle-log"></div>
  <button onclick="attack()">공격하기</button>
</div>

</div>

<script type="module">
    import { loadBattle } from "../js/battle.js";
    loadBattle("battleroom1");
</script>

</body>
</html>
