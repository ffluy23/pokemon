<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game</title>
</head>

<body>

<h1>배틀룸 1 테스트</h1>

<div id="gameArea">
<div id="battle-scene">
    <div id="opponent-area" class="side">
        <h3 id="p2-name">Player 2 대기 중...</h3>
        <div id="p2-active-wrap">
            <span id="p2-active-name">-</span> 
            <progress id="p2-hp-bar" value="0" max="100"></progress>
            <span id="p2-hp-text">0/0</span>
        </div>
        <div id="p2-bench" class="bench-small"></div>
    </div>

    <hr>

    <div id="player-area" class="side">
        <h3 id="p1-name">Player 1 대기 중...</h3>
        <div id="p1-active-wrap">
            <strong id="p1-active-name">-</strong> 
            <progress id="p1-hp-bar" value="0" max="100"></progress>
            <span id="p1-hp-text">0/0</span>
        </div>
        
        <div id="p1-bench">
            <span>교체: </span>
            <button id="btn-sub-0" class="sub-btn"></button>
            <button id="btn-sub-1" class="sub-btn"></button>
        </div>

        <div class="controls">
            <button id="attackBtn">공격!</button>
        </div>
    </div>
</div>
</div>


<script type="module">
    import { loadBattle } from "../js/battle.js";
    loadBattle("battleroom1");
</script>


</body>
</html>
