<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>배틀룸1</title>
  <link rel="stylesheet" href="css/style2.css">
  <style>
    #dice-wrap {
      display: none;
      justify-content: center;
      align-items: center;
      gap: 40px;
      margin: 20px 0;
    }
    .dice-box { text-align: center; }
    .dice-box span {
      display: block;
      font-size: 12px;
      color: gray;
      margin-bottom: 4px;
    }
    .dice-num {
      font-size: 64px;
      font-weight: bold;
      color: #e63946;
      min-width: 80px;
      text-align: center;
    }
    #turn-display {
      font-size: 20px;
      font-weight: bold;
      margin: 8px 0;
    }
    #turn-count { font-size: 14px; color: gray; }
    #move-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      max-width: 320px;
      margin: 12px 0;
    }
    #move-buttons button {
      padding: 10px;
      font-size: 13px;
      white-space: pre-line;
      text-align: center;
      line-height: 1.4;
    }
    #battle-log {
      width: 100%;
      max-height: 150px;
      overflow-y: auto;
      border: 1px solid #ccc;
      padding: 8px;
      background: #f9f9f9;
      font-size: 14px;
      box-sizing: border-box;
    }
    #battle-log p { margin: 2px 0; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #leaveBtn { display: none; }
    /* HP바 */
    .hp-bar-wrap {
      width: 100%;
      max-width: 240px;
      background: #333;
      border-radius: 4px;
      height: 10px;
      margin: 4px 0 6px;
      overflow: hidden;
    }
    .hp-bar {
      height: 100%;
      width: 100%;
      background: #4caf50;
      border-radius: 4px;
      transition: width 0.4s ease, background-color 0.4s ease;
    }
    /* Portrait */
    .portrait-img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      display: none;
    }
  </style>
</head>
<body>
  <!-- 주사위 모션 -->
  <div id="dice-wrap">
    <div class="dice-box" id="dice-box-p1">
      <span id="p1-name-dice">Player1</span>
      <div class="dice-num" id="dice-p1">?</div>
    </div>
    <div class="dice-box" id="dice-box-p2">
      <span id="p2-name-dice">Player2</span>
      <div class="dice-num" id="dice-p2">?</div>
    </div>
    <div class="dice-box" id="dice-box-hit" style="display:none;">
      <span>명중 판정</span>
      <div class="dice-num" id="dice-hit">?</div>
    </div>
  </div>

  <!-- 턴 표시 -->
  <div id="turn-display">대기 중...</div>
  <div id="turn-count"></div>
  <div id="spectator-list"></div>

  <!-- 플레이어 이름 -->
  <div>
    <span id="p1-name">Player1</span>
    vs
    <span id="p2-name">Player2</span>
  </div>
  <hr>

  <!-- 상대 포켓몬 -->
  <div>
    <h3>상대 포켓몬</h3>
    <img id="enemy-portrait" class="portrait-img" alt="" />
    <p id="enemy-active-name">-</p>
    <div class="hp-bar-wrap">
      <div class="hp-bar" id="enemy-hp-bar"></div>
    </div>
    <p id="enemy-active-hp"></p>
  </div>
  <hr>

  <!-- 내 포켓몬 -->
  <div>
    <h3>내 포켓몬</h3>
    <img id="my-portrait" class="portrait-img" alt="" />
    <p id="my-active-name">-</p>
    <div class="hp-bar-wrap">
      <div class="hp-bar" id="my-hp-bar"></div>
    </div>
    <p id="my-active-hp">HP: - / -</p>
  </div>

  <!-- 기술 버튼 2x2 -->
  <div id="move-buttons">
    <button id="move-btn-0" disabled>-</button>
    <button id="move-btn-1" disabled>-</button>
    <button id="move-btn-2" disabled>-</button>
    <button id="move-btn-3" disabled>-</button>
  </div>

  <!-- 교체 버튼 -->
  <div>
    <h4>교체할 포켓몬</h4>
    <div id="bench-container"></div>
  </div>

  <!-- 게임 종료 후 나가기 버튼 -->
  <button id="leaveBtn">방 나가기</button>

  <!-- 배틀 로그 -->
  <div>
    <h4>배틀 로그</h4>
    <div id="battle-log"></div>
  </div>

  <script>
    const ROOM_ID = "battleroom1"
  </script>
  <script type="module" src="../js/battle.js"></script>
</body>
</html>
