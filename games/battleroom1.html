<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game</title>
</head>

<body>

<h1>배틀룸 1 테스트</h1>

<div id="gameArea">
    <div id="battle-ui">
    <div class="side opponent">
        <h2 id="p2-name">상대방 대기 중...</h2>
        <div id="p2-main-poke" class="poke-card-main">
            <p class="poke-name">---</p>
            <p>HP: <span class="hp-val">0</span> / 100</p>
        </div>
    </div>

    <hr>

    <div class="side player">
        <h2 id="p1-name">내 이름</h2>
        <div id="p1-main-poke" class="poke-card-main">
            <p class="poke-name">---</p>
            <p>HP: <span class="hp-val">0</span> / 100</p>
        </div>

        <div id="p1-bench">
            <button onclick="switchPokemon(1)" id="btn-poke-1">대기 1</button>
            <button onclick="switchPokemon(2)" id="btn-poke-2">대기 2</button>
        </div>

        <div class="controls">
            <button onclick="attack()">공격하기</button>
        </div>
    </div>
    </div>

</div>

<script type="module">
    import { loadBattle } from "../js/battle.js";
    loadBattle("battleroom1");
</script>

</body>
</html>
