<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>배틀룸1</title>
  <style>
    #dice-wrap {
      display: none;
      justify-content: center;
      align-items: center;
      gap: 40px;
      margin: 20px 0;
    }
    .dice-box { text-align: center; }
    .dice-box span {
      display: block;
      font-size: 12px;
      color: gray;
      margin-bottom: 4px;
    }
    .dice-num {
      font-size: 64px;
      font-weight: bold;
      color: #e63946;
      min-width: 80px;
      text-align: center;
    }
    #turn-display {
      font-size: 20px;
      font-weight: bold;
      margin: 8px 0;
    }
    #turn-count {
      font-size: 14px;
      color: gray;
    }
    #move-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      max-width: 320px;
      margin: 12px 0;
    }
    #move-buttons button {
      padding: 10px;
      font-size: 13px;
      white-space: pre-line;
      text-align: center;
      line-height: 1.4;
    }
    #battle-log {
      width: 100%;
      max-height: 150px;
      overflow-y: auto;
      border: 1px solid #ccc;
      padding: 8px;
      background: #f9f9f9;
      font-size: 14px;
      box-sizing: border-box;
    }
    #battle-log p { margin: 2px 0; }
    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <!-- 주사위 모션 영역 -->
  <div id="dice-wrap">
    <!-- 선공 판정용 주사위 2개 -->
    <div class="dice-box" id="dice-box-p1">
      <span id="p1-name-dice">Player1</span>
      <div class="dice-num" id="dice-p1">?</div>
    </div>
    <div class="dice-box" id="dice-box-p2">
      <span id="p2-name-dice">Player2</span>
      <div class="dice-num" id="dice-p2">?</div>
    </div>
    <!-- 명중 판정용 주사위 1개 (평소엔 숨김) -->
    <div class="dice-box" id="dice-box-hit" style="display:none;">
      <span>명중 판정</span>
      <div class="dice-num" id="dice-hit">?</div>
    </div>
  </div>

  <!-- 턴 표시 -->
  <div id="turn-display">대기 중...</div>
  <div id="turn-count"></div>

  <!-- 플레이어 이름 -->
  <div>
    <span id="p1-name">Player1</span>
    vs
    <span id="p2-name">Player2</span>
  </div>

  <hr>

  <!-- 상대 포켓몬 -->
  <div>
    <h3>상대 포켓몬</h3>
    <p id="enemy-active-name">-</p>
    <p id="enemy-active-hp">HP: - / -</p>
  </div>

  <hr>

  <!-- 내 포켓몬 -->
  <div>
    <h3>내 포켓몬</h3>
    <p id="my-active-name">-</p>
    <p id="my-active-hp">HP: - / -</p>
  </div>

  <!-- 기술 버튼 2x2 -->
  <div id="move-buttons">
    <button id="move-btn-0" disabled>-</button>
    <button id="move-btn-1" disabled>-</button>
    <button id="move-btn-2" disabled>-</button>
    <button id="move-btn-3" disabled>-</button>
  </div>

  <!-- 교체 버튼 -->
  <div>
    <h4>교체할 포켓몬</h4>
    <div id="bench-container"></div>
  </div>

  <!-- 배틀 로그 -->
  <div>
    <h4>배틀 로그</h4>
    <div id="battle-log"></div>
  </div>

  <script>
    const ROOM_ID = "battleroom1"
  </script>
  <script type="module" src="../js/battle.js"></script>

</body>
</html>
