<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>더블배틀 #1</title>
</head>
<body>

<div id="header">
  <div id="status-display">더블배틀</div>
  <div id="turn-order-display">준비 중...</div>
</div>

<!-- 2×2 필드: 팀A 왼쪽 / 팀B 오른쪽 -->
<div id="field">
  <!-- 팀A p1 -->
  <div class="pkmn-card team-a">
    <div class="player-name" id="p1-player-name">P1</div>
    <div class="hp-text" id="p1-hp-text">-</div>
    <div class="hp-bar-wrap"><div class="hp-bar" id="p1-hp-bar"></div></div>
    <div class="pkmn-tag" id="p1-tag"></div>
  </div>
  <!-- 팀B p3 -->
  <div class="pkmn-card team-b">
    <div class="player-name" id="p3-player-name">P3</div>
    <div class="hp-text" id="p3-hp-text">-</div>
    <div class="hp-bar-wrap"><div class="hp-bar" id="p3-hp-bar"></div></div>
    <div class="pkmn-tag" id="p3-tag"></div>
  </div>
  <!-- 팀A p2 -->
  <div class="pkmn-card team-a">
    <div class="player-name" id="p2-player-name">P2</div>
    <div class="hp-text" id="p2-hp-text">-</div>
    <div class="hp-bar-wrap"><div class="hp-bar" id="p2-hp-bar"></div></div>
    <div class="pkmn-tag" id="p2-tag"></div>
  </div>
  <!-- 팀B p4 -->
  <div class="pkmn-card team-b">
    <div class="player-name" id="p4-player-name">P4</div>
    <div class="hp-text" id="p4-hp-text">-</div>
    <div class="hp-bar-wrap"><div class="hp-bar" id="p4-hp-bar"></div></div>
    <div class="pkmn-tag" id="p4-tag"></div>
  </div>
</div>

<!-- 배틀 로그 -->
<div id="battle-log"></div>

<!-- 타겟 선택 모달 -->
<div id="target-modal"></div>

<!-- 액션 패널 -->
<div id="action-panel">
  <div style="font-size:11px;color:#aaa;margin-bottom:6px;">⚔️ 내 턴 — 기술 선택 후 타겟을 고르세요</div>
  <div class="move-grid">
    <button id="move-btn-0">-</button>
    <button id="move-btn-1">-</button>
    <button id="move-btn-2">-</button>
    <button id="move-btn-3">-</button>
  </div>
  <div style="font-size:11px;color:#aaa;margin-bottom:4px;">팀 액션 (팀당 1회)</div>
  <div class="team-action-row">
    <button id="assist-btn">어시스트 요청</button>
    <button id="sync-btn">싱크로나이즈 요청</button>
  </div>
  <div id="pending-requests"></div>
</div>

<button id="leave-btn">나가기</button>

<script type="module">
  window.ROOM_ID = "doublebattleroom1"
</script>
<script type="module" src="../double/doublebattle.js"></script>
</body>
</html>
