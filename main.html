<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Main</title>
<link rel="stylesheet" href="css/style.css">
<style>
  /* ── 게임 기록 모달 ── */
  #log-modal {
    display: none;
    position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,0.6);
    align-items: center; justify-content: center;
  }
  #log-modal.open { display: flex; }

  #log-modal-inner {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 12px;
    width: 520px; max-width: 95vw;
    max-height: 80vh;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  #log-modal-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 18px;
    border-bottom: 1px solid #eee;
  }
  #log-modal-title {
    font-size: 14px; font-weight: bold; color: #111;
  }
  #log-modal-close {
    background: none; border: none; color: #aaa;
    font-size: 20px; cursor: pointer; line-height: 1;
  }
  #log-modal-close:hover { color: #333; }

  #log-modal-body {
    padding: 14px 18px;
    overflow-y: auto;
    flex: 1;
    line-height: 1.8;
    font-size: 13px;
    color: #333;
  }
  #log-modal-body p { margin: 2px 0; }

  /* ── 게임 기록 목록 ── */
  #game-log-section {
    margin-top: 32px;
  }
  #game-log-section h3 {
    font-size: 13px; color: #888;
    margin: 0 0 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  #game-log-list {
    display: flex; flex-direction: column; gap: 6px;
  }
  .game-log-item {
    display: flex; flex-direction: column; gap: 4px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid #333;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .game-log-item:hover {
    background: rgba(255,255,255,0.08);
    border-color: #555;
  }
  .game-log-vs {
    font-size: 14px; font-weight: bold; color: #111;
  }
  .game-log-meta {
    font-size: 11px; color: #888;
  }
  #game-log-empty {
    font-size: 12px; color: #555; padding: 8px 0;
  }
</style>
</head>
<body>
<h2>Battle Rooms</h2>
<button onclick="enterRoom(1)">BattleRoom1</button>
<button onclick="enterRoom(2)">BattleRoom2</button>
<button onclick="enterRoom(3)">BattleRoom3</button>

<!-- 게임 기록 목록 -->
<div id="game-log-section">
  <h3>게임 기록</h3>
  <div id="game-log-list">
    <div id="game-log-empty">불러오는 중...</div>
  </div>
</div>

<!-- 로그 모달 -->
<div id="log-modal">
  <div id="log-modal-inner">
    <div id="log-modal-header">
      <span id="log-modal-title">게임 로그</span>
      <button id="log-modal-close">✕</button>
    </div>
    <div id="log-modal-body"></div>
  </div>
</div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
